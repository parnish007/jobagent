name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobagent_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ANTHROPIC_API_KEY: sk-ant-dummy-for-ci
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobagent_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key-not-for-production
          ANTHROPIC_API_KEY: sk-ant-dummy-for-ci
          ENVIRONMENT: test
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short

      - name: Check imports (syntax)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobagent_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ANTHROPIC_API_KEY: sk-ant-dummy-for-ci
        run: python -c "from app.main import app; print('✓ App imports OK')"

  # ─── Frontend lint + type-check ─────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 0 || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t jobagent-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t jobagent-frontend:ci ./frontend
